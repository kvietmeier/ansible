---
# =============================================================================
# tasks/prereqs.yml
# =============================================================================
# Prerequisite checks and environment prep
#
# Description:
#   Waits for cloud-init completion, sets OS family facts, installs GCC for
#   Ubuntu, disables unattended-upgrades, ensures /root exists, and installs
#   missing cloud kernel modules for RDMA transport.
#
# Tags:
#   [prereqs]
# =============================================================================

- name: Set OS family flags
  set_fact:
    is_redhat: "{{ ansible_facts['distribution'] in ['RedHat', 'CentOS', 'Rocky', 'AlmaLinux'] }}"
    is_ubuntu: "{{ ansible_facts['distribution'] == 'Ubuntu' }}"

- name: Check cloud-init service
  systemd:
    name: cloud-init
  register: cloudinit_status
  failed_when: false
  changed_when: false

- name: Wait for cloud-init to finish
  wait_for:
    path: /var/lib/cloud/instance/boot-finished
    state: present
    timeout: 600
  when: cloudinit_status.status is defined and cloudinit_status.status.ActiveState == 'active'

- name: Ensure /root directory exists
  file:
    path: /root
    state: directory

# Install extra cloud kernel modules & RDMA packages before building
- name: Install extra kernel modules and RDMA core packages (Ubuntu)
  apt:
    name:
      - linux-modules-extra-gcp
      - rdma-core
    state: present
    update_cache: yes
  when: is_ubuntu
  register: ubuntu_kernel_ext

- name: Install extra kernel modules and RDMA core packages (RedHat)
  dnf:
    name:
      - kernel-modules-extra
      - rdma-core
    state: present
  when: is_redhat
  register: redhat_kernel_ext

- name: Reboot immediately if extra kernel modules were installed
  reboot:
    reboot_timeout: 600
  when: (ubuntu_kernel_ext.changed if is_ubuntu else false) or (redhat_kernel_ext.changed if is_redhat else false)

# SAFETY STEP: Wait for SSH to cleanly handle requests again
- name: Wait for host to fully finish SSH initialization
  wait_for_connection:
    delay: 10
    timeout: 300
  when: (ubuntu_kernel_ext.changed if is_ubuntu else false) or (redhat_kernel_ext.changed if is_redhat else false)

- name: Force load rpcrdma module
  community.general.modprobe:
    name: rpcrdma
    state: present

# Original GCC 12 Setup Block
- name: Install GCC 12 and set default (Ubuntu only)
  block:
    - name: Install GCC 12
      apt:
        name:
          - gcc-12
          - g++-12
        state: present
    - name: Set GCC 12 as default
      shell: |
        update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
        update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
  when: is_ubuntu