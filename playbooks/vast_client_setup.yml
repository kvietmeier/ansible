###===================================================================================###
# Top-Level Playbook for VAST NFS Client Installation & Identity Scaling (10 Users)
#   
# Features: Tagged Execution Vectors, Sudo Management, Custom Environment Injection
# Created By: Karl Vietmeier
###===================================================================================###
- name: Install VAST NFS driver and SpecFS Benchmark
  hosts: clients
  become: yes

  pre_tasks:
  #---------------------------------------------------------------------------------
    # 0. BASE OS PACKAGE SUBSYSTEM MAPPING
    #---------------------------------------------------------------------------------
    - name: Ensure baseline system utilities and client binaries are installed
      ansible.builtin.apt:
        name:
          - nfs-common     # Vital requirement for mounting the VAST file views
          - rpcbind        # Supports background RPC coordination for storage paths
          # --- Add future lab tool requirements here ---
        state: present
        update_cache: yes   # Automatically runs apt-get update first if cache is stale
      tags: [ 'packages', 'setup_env' ]
      
    #---------------------------------------------------------------------------------
    # 1. NEW USER CREATION VECTOR
    #---------------------------------------------------------------------------------
    - name: Ensure new clone users 06 through 10 exist on the client systems
      ansible.builtin.user:
        name: "labuser{{ item }}"
        state: present
        shell: /bin/bash
        create_home: yes
      with_sequence: start=6 end=10 format=%02d
      tags: [ 'never', 'provision_users', 'setup_env' ] # 'never' means skipped unless explicitly called

    #---------------------------------------------------------------------------------
    # 2. DIRECTORY PROVISIONING VECTOR
    #---------------------------------------------------------------------------------
    - name: Ensure VAST labuser mount directories exist with 777 permissions
      ansible.builtin.file:
        path: "/mount/vast/labuser{{ item }}"
        state: directory
        mode: '0777'
      with_sequence: start=1 end=10 format=%02d
      tags: [ 'mounts', 'setup_env' ]

    #---------------------------------------------------------------------------------
    # 3. USER PRIVILEGE ESCALATION BLOCK
    #---------------------------------------------------------------------------------
    - name: Configure passwordless sudo entry for labuser01 through labuser10
      ansible.builtin.lineinfile:
        path: "/etc/sudoers.d/labusers"
        create: yes
        owner: root
        group: root
        mode: '0440'
        line: "labuser{{ item }} ALL=(ALL) NOPASSWD:ALL"
        validate: '/usr/sbin/visudo -cf %s'
      with_sequence: start=1 end=10 format=%02d
      tags: [ 'sudo', 'setup_env' ]

    #---------------------------------------------------------------------------------
    # 4. USER RUNTIME ENVIRONMENT STACK (.dircolors distribution)
    #---------------------------------------------------------------------------------
    - name: Copy .dircolors to base labuser home directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/env/dircolors"
        dest: /home/labuser/.dircolors
        owner: labuser
        group: labuser
        mode: '0644'
      tags: [ 'env_files', 'setup_env' ]

    - name: Copy .dircolors to labuser01 through labuser10 home directories
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/env/dircolors"
        dest: "/home/labuser{{ item }}/.dircolors"
        owner: "labuser{{ item }}"
        group: "labuser{{ item }}"
        mode: '0644'
      with_sequence: start=1 end=10 format=%02d
      tags: [ 'env_files', 'setup_env' ]

    #---------------------------------------------------------------------------------
    # 5. CORE BASH RESILIENCY STACK
    #---------------------------------------------------------------------------------
    - name: Copy bashrc template to base labuser profile backing up original
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/bashrc_ubuntu_cloud.sh"
        dest: /home/labuser/.bashrc
        backup: yes
        owner: labuser
        group: labuser
        mode: '0644'
      tags: [ 'bashrc', 'setup_env' ]

    - name: Copy bashrc template to labuser01 through labuser10 profiles backing up originals
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/bashrc_ubuntu_cloud.sh"
        dest: "/home/labuser{{ item }}/.bashrc"
        backup: yes
        owner: "labuser{{ item }}"
        group: "labuser{{ item }}"
        mode: '0644'
      with_sequence: start=1 end=10 format=%02d
      tags: [ 'bashrc', 'setup_env' ]

    #---------------------------------------------------------------------------------
    # 6. SSH SECURITY KEY ALIGNMENT
    #---------------------------------------------------------------------------------
    - name: Ensure secure .ssh directory exists for all 10 labusers
      ansible.builtin.file:
        path: "/home/labuser{{ item }}/.ssh"
        state: directory
        owner: "labuser{{ item }}"
        group: "labuser{{ item }}"
        mode: '0700'
      with_sequence: start=1 end=10 format=%02d
      tags: [ 'ssh_keys', 'setup_env' ]

    - name: Copy authorized_keys from base labuser to all 10 labuser profiles
      ansible.builtin.copy:
        src: /home/labuser/.ssh/authorized_keys
        dest: "/home/labuser{{ item }}/.ssh/authorized_keys"
        remote_src: yes
        owner: "labuser{{ item }}"
        group: "labuser{{ item }}"
        mode: '0600'
      with_sequence: start=1 end=10 format=%02d
      tags: [ 'ssh_keys', 'setup_env' ]

  roles:
    # - { role: vast_nfs, tags: ['drivers'] }
    # - { role: vast, tags: ['vast_core'] }
    # - { role: specsfs, tags: ['benchmarks'] }